<!DOCTYPE html>
<html>

<head>

    <title>AutoDrive Customer Form</title>

    <style>

        body {
            font-family: Arial;
            margin: 0;
            background-color: lightgray;
        }

        .navbar {
            background-color: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }

        .heading {
            text-align: center;
            margin-top: 20px;
        }

        .heading h1 {
            color: darkred;
        }

        .form-box {
            background-color: white;
            width: 320px;
            margin: 30px auto;
            padding: 40px;
            border-radius: 8px;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: darkred;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="#">Home</a>
        <a href="#">Cars</a>
        <a href="#">Contact</a>

    </div>

    <div class="heading">

        <h1>AutoDrive Showroom</h1>

        <p>Book your favourite car</p>

    </div>

    <div class="form-box">

        <form onsubmit="return validateForm()">

            <label>Name</label>

            <input type="text" id="name" placeholder="Enter your name">

            <label>Email</label>

            <input type="email" id="email" placeholder="Enter your email">

            <label>Gender</label>

            <select id="gender">

                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>

            </select>

            <label>Date of Birth</label>

            <input type="date" id="dob">

            <button type="submit">Book Now</button>

        </form>

    </div>

    <script>

        function validateForm() {

            let name = document.getElementById("name").value;
            let email = document.getElementById("email").value;
            let gender = document.getElementById("gender").value;
            let dob = document.getElementById("dob").value;

            if (name == "") {
                alert("Please enter your name");
                return false;
            }

            if (email == "") {
                alert("Please enter your email");
                return false;
            }

            if (!email.includes("@")) {
                alert("Enter a valid email");
                return false;
            }

            if (gender == "") {
                alert("Please select gender");
                return false;
            }

            if (dob == "") {
                alert("Please enter date of birth");
                return false;
            }

            alert("Form Submitted Successfully");
            return true;

        }

    </script>

</body>

</html>
