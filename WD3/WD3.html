<!DOCTYPE html>
<html>

<head>

    <title>AutoDrive Customer Form</title>

    <style>

        body {
            font-family: Arial;
            margin: 0;
            background-color: lightgray;
        }

        .navbar {
            background-color: black;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            margin: 15px;
            text-decoration: none;
        }

        .heading {
            text-align: center;
            margin-top: 20px;
        }

        .heading h1 {
            color: darkred;
        }

        .form-box {
            background-color: white;
            width: 320px;
            margin: 30px auto;
            padding: 50px;
            border-radius: 8px;
        }

        label {
            font-weight: bold;
        }

        input,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: darkred;
            color: white;
            
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="#">Home</a>
        <a href="#">Cars</a>
        <a href="#">Contact</a>

    </div>

    <div class="heading">

        <h1>AutoDrive Showroom</h1>

        <p>Book your favourite car</p>

    </div>

    <div class="form-box">

        <form>

            <label>Name</label>

            <input type="text" id="name" placeholder="Enter your name">

            <label>Email</label>

            <input type="email" id="email" placeholder="Enter your email">

            <label>Gender</label>

            <select>

                <option>Male</option>
                <option>Female</option>

            </select>

            <label>Date of Birth</label>

            <input type="date">

            <button type="submit">Book Now</button>

        </form>

    </div>

</body>

</html>
