<!DOCTYPE html>
<html>

<head>

    <title>Car Showroom</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f2f2f2;
        }

        .navbar {
            background-color: #111;
            padding: 15px;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 20px;
            font-size: 18px;
        }

        h1 {
            text-align: center;
            color: darkred;
            margin-top: 30px;
        }

        p {
            text-align: center;
            color: #444;
        }

        .cars {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
        }

        .card {
            background-color: white;
            width: 250px;
            border-radius: 10px;
            text-align: center;
            padding: 15px;
            box-shadow: 0px 0px 10px gray;
        }

        .card img {
            width: 100%;
            height: 150px;
            border-radius: 8px;
        }

        .card h2 {
            color: darkblue;
        }

        .price {
            color: darkred;
            font-weight: bold;
            font-size: 18px;
        }

        button {
            background-color: darkred;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: black;
        }

        table {
            width: 100%;
        }

        th {
            background-color: darkred;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="#">Home</a>
        <a href="#">Cars</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>

    </div>

    <h1>Welcome to Car Showroom</h1>

    <p>Choose your dream car from our premium collection.</p>

    <div class="cars">

        <div class="card">

            <img src="https://tse2.mm.bing.net/th/id/OIP.OSPoziV9UKb5bJUnJp0mEwHaEK?pid=Api&P=0&h=180">

            <h2>Audi A8</h2>

            <p class="price">$42,000</p>

            <button>Buy Now</button>

        </div>

        <div class="card">

            <img src="https://tse2.mm.bing.net/th/id/OIP.f7yg6dQ8YfKql4FJdBQfrwHaE8?pid=Api&P=0&h=180">

            <h2>BMW X5</h2>

            <p class="price">$45,000</p>

            <button>Buy Now</button>

        </div>

        <div class="card">

            <img src="https://tse2.mm.bing.net/th/id/OIP.64wCZshCfYnr4oA2aZguPwHaE8?pid=Api&P=0&h=180">

            <h2>Lamborghini</h2>

            <p class="price">$250,000</p>

            <button>Buy Now</button>

        </div>

    </div>

    <!-- Main Table -->

    <table border="1">

        <tr>
            <th>Car</th>
            <th>Details</th>
        </tr>

        <tr>

            <td>Audi A8</td>

            <td>

                <!-- Nested Table -->

                <table border="1">

                    <tr>
                        <th>Type</th>
                        <th>Price</th>
                    </tr>

                    <tr>
                        <td>Buy</td>
                        <td>$42,000</td>
                    </tr>

                    <tr>
                        <td>Rent</td>
                        <td>$400/day</td>
                    </tr>

                </table>

            </td>

        </tr>

        <tr>

            <td>BMW X5</td>

            <td>

                <table border="1">

                    <tr>
                        <th>Type</th>
                        <th>Price</th>
                    </tr>

                    <tr>
                        <td>Buy</td>
                        <td>$45,000</td>
                    </tr>

                    <tr>
                        <td>Rent</td>
                        <td>$350/day</td>
                    </tr>

                </table>

            </td>

        </tr>

    </table>

</body>

</html>
