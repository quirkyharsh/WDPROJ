<!DOCTYPE html>
<html>

<head>

    <title>Car Website</title>

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Navbar -->

    <nav class="navbar navbar-dark bg-dark">

        <div class="container">

            <a href="#" class="text-danger text-decoration-none">
                AutoDrive
            </a>

            <div>

                <a href="#" class="text-white me-3 text-decoration-none">
                    Home
                </a>

                <a href="#" class="text-white me-3 text-decoration-none">
                    Cars
                </a>

                <a href="#" class="text-white me-3 text-decoration-none">
                    Contact
                </a>

            </div>

        </div>

    </nav>

    <!-- Heading -->

    <div class="bg-danger text-white text-center p-5">

        <h1>Welcome to AutoDrive</h1>

        <p>Choose Your Favourite Car</p>

    </div>

    <!-- Car Cards -->

    <div class="container mt-5">

        <div class="row">

            <!-- Card 1 -->

            <div class="col-md-4">

                <div class="card text-center p-4">

                    <h2 class="text-danger">
                        Audi
                    </h2>

                    <p>
                        Luxury Sedan Car
                    </p>

                    <h4>
                        $42,000
                    </h4>

                    <button class="btn btn-danger">
                        Buy Now
                    </button>

                </div>

            </div>

            <!-- Card 2 -->

            <div class="col-md-4">

                <div class="card text-center p-4">

                    <h2 class="text-primary">
                        BMW
                    </h2>

                    <p>
                        Premium Sports SUV
                    </p>

                    <h4>
                        $45,000
                    </h4>

                    <button class="btn btn-primary">
                        Buy Now
                    </button>

                </div>

            </div>

            <!-- Card 3 -->

            <div class="col-md-4">

                <div class="card text-center p-4">

                    <h2 class="text-success">
                        Lamborghini
                    </h2>

                    <p>
                        Super Luxury Sports Car
                    </p>

                    <h4>
                        $250,000
                    </h4>

                    <button class="btn btn-success">
                        Buy Now
                    </button>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
